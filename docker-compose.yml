services:
  postgres:
    profiles: ["scaffolding"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchbridge
      POSTGRES_PASSWORD: watchbridge
      POSTGRES_DB: watchbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    profiles: ["scaffolding"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres-data:
