services:
  edge:
    build:
      context: .
      target: edge
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${WATCHBRIDGE_TLS_HTTP_PORT:-80}:8080"
      - "${WATCHBRIDGE_TLS_HTTPS_PORT:-443}:8443"
    secrets:
      - source: watchbridge_tls_certificate
        target: watchbridge_tls_certificate.pem
      - source: watchbridge_tls_private_key
        target: watchbridge_tls_private_key.pem
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: ${WATCHBRIDGE_EDGE_CPUS:-0.25}
    mem_limit: ${WATCHBRIDGE_EDGE_MEMORY_LIMIT:-128m}
    memswap_limit: ${WATCHBRIDGE_EDGE_MEMORY_LIMIT:-128m}
    pids_limit: 64
    restart: unless-stopped

secrets:
  watchbridge_tls_certificate:
    file: ${WATCHBRIDGE_TLS_CERTIFICATE_PATH:?set the absolute PEM certificate path in your environment}
  watchbridge_tls_private_key:
    file: ${WATCHBRIDGE_TLS_PRIVATE_KEY_PATH:?set the absolute PEM private-key path in your environment}
