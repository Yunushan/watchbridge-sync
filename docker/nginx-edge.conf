events {}

pid /tmp/nginx.pid;

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  client_header_timeout 15s;
  client_body_timeout 60s;
  keepalive_timeout 5s;
  send_timeout 60s;
  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  scgi_temp_path /tmp/scgi;
  uwsgi_temp_path /tmp/uwsgi;
  log_format watchbridge_safe '$remote_addr [$time_local] "$request_method $uri $server_protocol" $status $body_bytes_sent $request_time $request_id';
  access_log /dev/stdout watchbridge_safe;
  error_log /dev/stderr warn;

  # Keep HTTP only for the ACME-/load-balancer-compatible redirect and this
  # container's local health probe. The application is never proxied over HTTP.
  server {
    listen 8080;
    server_name _;

    location = /edge-healthz {
      access_log off;
      return 204;
    }

    location / {
      return 308 https://$host$request_uri;
    }
  }

  server {
    listen 8443 ssl;
    server_name _;
    client_max_body_size 10m;

    ssl_certificate /run/secrets/watchbridge_tls_certificate.pem;
    ssl_certificate_key /run/secrets/watchbridge_tls_private_key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS belongs only on the HTTPS listener. Operators must ensure every
    # hostname they serve over this edge supports HTTPS before raising its age.
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
      proxy_pass http://web:8080;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
