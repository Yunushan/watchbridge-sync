events {}

pid /tmp/nginx.pid;

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  server_tokens off;
  client_header_timeout 15s;
  client_body_timeout 60s;
  keepalive_timeout 5s;
  send_timeout 60s;
  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  scgi_temp_path /tmp/scgi;
  uwsgi_temp_path /tmp/uwsgi;
  # `$uri` deliberately excludes query parameters, including OAuth callback
  # codes and state. Do not replace it with `$request` in access logs.
  log_format watchbridge_safe '$remote_addr [$time_local] "$request_method $uri $server_protocol" $status $body_bytes_sent $request_time $request_id';
  access_log /dev/stdout watchbridge_safe;
  error_log /dev/stderr warn;

  # Keep cache policy at server scope. Location-scoped `add_header` directives
  # replace inherited security headers in Nginx, which would leave the SPA shell
  # or assets without the hardening policy below.
  map $uri $watchbridge_cache_control {
    default "no-store";
    ~^/assets/ "public, max-age=31536000, immutable";
    =/.well-known/security.txt "public, max-age=86400";
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    add_header Cache-Control $watchbridge_cache_control always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Request-ID $request_id always;

    location = /.well-known/security.txt {
      alias /etc/nginx/security.txt;
      default_type text/plain;
    }

    # Vite content-hashes every production asset name. Keep those bytes cached,
    # but always revalidate the application shell so a deployment is visible.
    location ^~ /assets/ {
      try_files $uri =404;
    }

    location = /index.html {
      try_files $uri =404;
    }

    location = /healthz {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header Host $host;
    }

    location = /readyz {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header Host $host;
    }

    location /v1/ {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
